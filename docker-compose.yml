version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ilm_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-dummy}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-dummy}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ilm_ai
      - JWT_SECRET=${JWT_SECRET:-dev_secret}
      - SECRET_KEY=${SECRET_KEY:-dev_secret}
      - SENTRY_DSN=${SENTRY_DSN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - PAYMENT_TEST_MODE=${PAYMENT_TEST_MODE:-true}
      - PAYME_MERCHANT_ID=${PAYME_MERCHANT_ID}
      - PAYME_KEY=${PAYME_KEY}
      - CLICK_SERVICE_ID=${CLICK_SERVICE_ID}
      - CLICK_MERCHANT_ID=${CLICK_MERCHANT_ID}
      - CLICK_SECRET_KEY=${CLICK_SECRET_KEY}
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ../ilm-ai-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  telegram_bot:
    build: .
    command: python run_telegram_bot.py
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-dummy}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-dummy}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ilm_ai
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:

databases:
  - name: ilm-ai-db
    plan: free

services:
  # ── Backend API ───────────────────────────────────────────────────────────
  - type: web
    name: ilm-ai-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ilm-ai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      # AI: comma-separated list of Gemini API keys (auto-rotates on quota/errors)
      - key: GEMINI_API_KEYS
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # Frontend origin(s) allowed to make credentialed requests (comma-separated)
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: PAYMENT_TEST_MODE
        value: "true"

  # ── Telegram bot (background worker) ──────────────────────────────────────
  - type: worker
    name: ilm-ai-telegram-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run_telegram_bot.py
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ilm-ai-db
          property: connectionString
      - key: GEMINI_API_KEYS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false

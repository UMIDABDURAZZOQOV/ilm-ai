databases:
  - name: ilm-ai-db
    plan: free

services:
  # ── Backend API ───────────────────────────────────────────────────────────
  - type: web
    name: ilm-ai-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ilm-ai-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      # AI: comma-separated list of Gemini API keys (auto-rotates on quota/errors)
      - key: GEMINI_API_KEYS
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # Frontend origin(s) allowed to make credentialed requests (comma-separated)
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Email verification uses a Gmail address + app password
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: PAYMENT_TEST_MODE
        value: "true"

# Note: the Telegram bot runs as a separate process (run_telegram_bot.py).
# Render's free plan does not include background workers, so it is not deployed
# here — run it locally during beta, or add a worker service on a paid plan.
